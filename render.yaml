services:
  - type: web
    name: manivtha-tours-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSCODE
        value: admin123
      - key: GEMINI_API_KEY
        value: "" # Enter your actual Gemini Key in the Render dashboard
      - key: MONGODB_URI
        value: "" # Enter your MongoDB Atlas URI in the Render dashboard
