name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          cd "manivtha-tours-travels/frontend"
          npm install
          npm run build
          cp dist/index.html dist/404.html
          mv dist ../../build-output
        env:
          VITE_API_URL: https://manvitha-tours-travels-ai-chat-bot.onrender.com

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build-output
          branch: gh-pages
